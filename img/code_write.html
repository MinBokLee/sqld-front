<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>게시글 작성 - SQLD 커뮤니티</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', 'Noto Sans KR', sans-serif;
        }
        .ck-editor-mock {
            border: 1px solid #cfdbe7;
            border-radius: 0.5rem;
            overflow: hidden;
        }
        .ck-toolbar-mock {
            background-color: #f8fafc;
            border-bottom: 1px solid #cfdbe7;
            display: flex;
            padding: 0.5rem;
            gap: 0.25rem;
        }
        .ck-content-mock {
            min-height: 400px;
            padding: 1.5rem;
            outline: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen flex-col">
<!-- Header -->
<header class="sticky top-0 z-50 w-full border-b border-slate-200 bg-white/80 backdrop-blur-md dark:bg-background-dark/80 dark:border-slate-800">
<div class="mx-auto flex max-w-[1200px] items-center justify-between px-6 py-3">
<div class="flex items-center gap-8">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-3xl font-bold">database</span>
<h1 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-slate-50">SQLD 커뮤니티</h1>
</div>
<nav class="hidden items-center gap-6 md:flex">
<a class="text-sm font-semibold text-slate-600 hover:text-primary transition-colors" href="#">공지사항</a>
<a class="text-sm font-semibold text-slate-600 hover:text-primary transition-colors" href="#">SQLD 스터디</a>
<a class="text-sm font-semibold text-slate-600 hover:text-primary transition-colors" href="#">가입인사</a>
</nav>
</div>
<div class="flex flex-1 items-center justify-end gap-4">
<div class="relative hidden w-full max-w-xs sm:block">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
<input class="w-full rounded-lg border-none bg-slate-100 py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/50 dark:bg-slate-800" placeholder="검색어를 입력하세요..." type="text"/>
</div>
<div class="flex items-center gap-2">
<button class="rounded-lg px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">로그인</button>
<button class="rounded-lg bg-primary px-4 py-2 text-sm font-bold text-white hover:bg-primary/90 transition-all">회원가입</button>
</div>
</div>
</div>
</header>
<!-- Main Content -->
<main class="mx-auto w-full max-w-[900px] flex-1 px-6 py-10">
<div class="mb-8 flex flex-col gap-2">
<h2 class="text-3xl font-black tracking-tight text-slate-900 dark:text-slate-50">새 게시글 작성</h2>
<p class="text-slate-500 dark:text-slate-400">SQLD 지식과 경험을 커뮤니티와 공유해 보세요.</p>
</div>
<div class="flex flex-col gap-8 rounded-xl bg-white p-8 shadow-sm border border-slate-200 dark:bg-slate-900 dark:border-slate-800">
<!-- Category Selection -->
<div class="flex flex-col gap-3">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300">카테고리 선택</label>
<div class="flex flex-wrap gap-2">
<button class="flex items-center gap-2 rounded-lg border-2 border-primary bg-primary/5 px-4 py-2 text-sm font-bold text-primary transition-all">
<span class="material-symbols-outlined text-lg">campaign</span> 공지사항
                        </button>
<button class="flex items-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 text-sm font-medium text-slate-600 hover:border-primary/50 hover:text-primary transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400">
<span class="material-symbols-outlined text-lg">school</span> SQLD 스터디
                        </button>
<button class="flex items-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-4 py-2 text-sm font-medium text-slate-600 hover:border-primary/50 hover:text-primary transition-all dark:bg-slate-800 dark:border-slate-700 dark:text-slate-400">
<span class="material-symbols-outlined text-lg">sentiment_very_satisfied</span> 가입인사
                        </button>
</div>
</div>
<!-- Title Input -->
<div class="flex flex-col gap-3">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300" for="post-title">제목</label>
<input class="w-full rounded-lg border-slate-200 py-4 text-xl font-bold placeholder:text-slate-300 focus:border-primary focus:ring-primary/20 dark:bg-slate-800 dark:border-slate-700" id="post-title" placeholder="제목을 입력해 주세요" type="text"/>
</div>
<!-- CKEditor Mock -->
<div class="flex flex-col gap-3">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300">내용</label>
<div class="ck-editor-mock dark:border-slate-700">
<div class="ck-toolbar-mock dark:bg-slate-800">
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"><span class="material-symbols-outlined text-xl">format_bold</span></button>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"><span class="material-symbols-outlined text-xl">format_italic</span></button>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"><span class="material-symbols-outlined text-xl">format_list_bulleted</span></button>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"><span class="material-symbols-outlined text-xl">format_list_numbered</span></button>
<div class="mx-1 h-6 w-px bg-slate-300 dark:bg-slate-600"></div>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"><span class="material-symbols-outlined text-xl">code</span></button>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"><span class="material-symbols-outlined text-xl">link</span></button>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"><span class="material-symbols-outlined text-xl">image</span></button>
<div class="mx-1 h-6 w-px bg-slate-300 dark:bg-slate-600"></div>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"><span class="material-symbols-outlined text-xl">undo</span></button>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"><span class="material-symbols-outlined text-xl">redo</span></button>
</div>
<div class="ck-content-mock dark:bg-slate-900" contenteditable="true" data-placeholder="내용을 입력하세요...">
<p class="text-slate-400">내용을 입력하세요...</p>
</div>
</div>
</div>
<!-- Image Upload -->
<div class="flex flex-col gap-3">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300">이미지 첨부</label>
<div class="flex w-full flex-col gap-4">
<div class="flex h-32 w-full flex-col items-center justify-center gap-2 rounded-xl border-2 border-dashed border-slate-200 bg-slate-50 hover:border-primary hover:bg-primary/5 transition-all cursor-pointer dark:bg-slate-800 dark:border-slate-700">
<span class="material-symbols-outlined text-3xl text-slate-400">cloud_upload</span>
<p class="text-sm text-slate-500">이미지를 드래그하거나 클릭하여 업로드하세요.</p>
</div>
<!-- Thumbnail List -->
<div class="flex flex-wrap gap-4">
<div class="group relative h-20 w-20 overflow-hidden rounded-lg border border-slate-200 dark:border-slate-700">
<img alt="Post thumbnail" class="h-full w-full object-cover" data-alt="SQL code snippet on a screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAAsxKmmgaujZMaQUh22X2Y3LBsMBxWXDJmGa6GGCrqgHKylq2TUQt4hWhSD1jrF_johPUDWYFSjCZyNl8lEIi24IA4p_aMTJlWHlN9iY5vpA9wLAS0WtGARTLlWo7dGoZTdifeFphdaAQCOmDuikco2wDrENtDMyIkRx6IuSoHsMKHQDnGiUuCD8kPl1v1b_JiAzVAHevRot9vXSW_NAfi5RblzpO5lsQnX8_eKRhWknPWq8sKGsAxAQFMTb1bySOBs1q77dSHwBw"/>
<button class="absolute right-1 top-1 flex h-5 w-5 items-center justify-center rounded-full bg-slate-900/60 text-white backdrop-blur-sm transition-opacity hover:bg-red-500">
<span class="material-symbols-outlined text-xs">close</span>
</button>
</div>
<div class="group relative h-20 w-20 overflow-hidden rounded-lg border border-slate-200 dark:border-slate-700">
<img alt="Post thumbnail" class="h-full w-full object-cover" data-alt="Technical documentation diagram" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBBwdnCAxZszAAlsDm16pHAx8l1OVv2ia3aK-dy1NYrBxwGfpYkzk0UvYvAOMsnn2rLMYUuiEmnO6LBYXS_EgHUwMfjAM5gyfS_Cwq7XikcQeTNSzBSPh0D0YSU1wWmhy-OobEZNt0LBW075YblrqR74YptgcMGqZD5gBVDUbOC33_6mYMOMHWCVy-OFl7U5E7AizIDDOnOjzu9P38HtCX1MryzrlEBu3zTcjiix3B2TIgpbHTqiYlSMQVclW8-T7TPcbZZ2ixixOo"/>
<button class="absolute right-1 top-1 flex h-5 w-5 items-center justify-center rounded-full bg-slate-900/60 text-white backdrop-blur-sm transition-opacity hover:bg-red-500">
<span class="material-symbols-outlined text-xs">close</span>
</button>
</div>
</div>
</div>
</div>
<!-- Tags -->
<div class="flex flex-col gap-3">
<label class="text-sm font-bold text-slate-700 dark:text-slate-300" for="tags">태그</label>
<div class="flex flex-col gap-2">
<input class="w-full rounded-lg border-slate-200 py-3 text-sm focus:border-primary focus:ring-primary/20 dark:bg-slate-800 dark:border-slate-700" id="tags" placeholder="태그 입력 (쉼표로 구분)" type="text"/>
<div class="flex flex-wrap gap-2">
<span class="flex items-center gap-1 rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600 dark:bg-slate-800 dark:text-slate-400">
                                #SQLD <button class="material-symbols-outlined text-sm">close</button>
</span>
<span class="flex items-center gap-1 rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600 dark:bg-slate-800 dark:text-slate-400">
                                #데이터베이스 <button class="material-symbols-outlined text-sm">close</button>
</span>
</div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-10 flex items-center justify-end gap-3">
<button class="rounded-lg px-6 py-3 text-sm font-bold text-slate-500 hover:bg-slate-100 transition-colors dark:text-slate-400 dark:hover:bg-slate-800">취소</button>
<button class="flex items-center gap-2 rounded-lg border border-slate-200 px-6 py-3 text-sm font-bold text-slate-700 hover:bg-slate-50 transition-colors dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-xl">save</span> 임시 저장
                </button>
<button class="flex items-center gap-2 rounded-lg bg-primary px-10 py-3 text-sm font-bold text-white shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
<span class="material-symbols-outlined text-xl">send</span> 발행하기
                </button>
</div>
</main>
<!-- Footer -->
<footer class="mt-auto border-t border-slate-200 bg-white py-8 dark:bg-slate-900 dark:border-slate-800">
<div class="mx-auto max-w-[1200px] px-6 text-center text-sm text-slate-500">
<p>© 2024 SQLD 커뮤니티. All rights reserved.</p>
</div>
</footer>
</div>
</body></html>
