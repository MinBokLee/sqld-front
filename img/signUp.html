<!DOCTYPE html>
<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&amp;family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb","background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Pretendard", "Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "premium": "0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05)",
                        "input-focus": "0 0 0 4px rgba(37, 99, 235, 0.1)"
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-display;
            }
        }
    </style>
<title>SQLD Community - 회원가입</title>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-6 relative overflow-x-hidden">
<div class="fixed top-0 left-0 -z-10 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px] -translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 right-0 -z-10 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] translate-x-1/3 translate-y-1/3"></div>
<div class="max-w-xl w-full bg-white dark:bg-slate-900 shadow-premium rounded-2xl overflow-hidden border border-slate-100 dark:border-slate-800 relative">
<div class="absolute top-6 right-8 z-10">
<div class="flex items-center bg-slate-100 dark:bg-slate-800 p-1 rounded-lg border border-slate-200 dark:border-slate-700">
<button class="px-3 py-1 text-[11px] font-bold bg-white dark:bg-slate-600 shadow-sm rounded-md text-primary transition-all">KR</button>
<button class="px-3 py-1 text-[11px] font-medium text-slate-500 hover:text-slate-700 dark:text-slate-400 transition-all">EN</button>
</div>
</div>
<div class="px-8 pt-12 pb-8 text-center">
<div class="inline-flex items-center justify-center w-14 h-14 bg-primary rounded-2xl mb-6 text-white shadow-xl shadow-primary/30 transform -rotate-3">
<span class="material-symbols-outlined text-3xl">database</span>
</div>
<h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">SQLD 커뮤니티 가입</h1>
<p class="text-slate-500 dark:text-slate-400 mt-3 text-sm leading-relaxed">SQL 개발자 자격증 합격을 위한 최고의 커뮤니티에 합류하세요.</p>
</div>
<div class="px-10 pb-12">
<form action="#" class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-800 dark:text-slate-200" for="user-id">아이디</label>
<div class="flex gap-2">
<div class="relative flex-grow group">
<span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">person</span>
</span>
<input class="block w-full pl-11 pr-3 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-0 focus:border-primary focus:bg-white dark:focus:bg-slate-800 transition-all text-sm" id="user-id" name="user-id" placeholder="사용할 아이디를 입력하세요" type="text"/>
</div>
<button class="px-5 py-3 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-primary hover:text-white dark:hover:bg-primary font-semibold rounded-xl text-xs transition-all whitespace-nowrap border border-slate-200 dark:border-slate-700 shadow-sm" type="button">
                        중복 확인
                    </button>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-800 dark:text-slate-200" for="password">비밀번호</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock_open</span>
</span>
<input class="block w-full pl-11 pr-3 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-0 focus:border-primary focus:bg-white dark:focus:bg-slate-800 transition-all text-sm" id="password" name="password" placeholder="•••••••••••••••" type="password"/>
</div>
<div class="flex items-center gap-1.5 px-1">
<span class="material-symbols-outlined text-[16px] text-primary">info</span>
<p class="text-[11.5px] text-slate-500 dark:text-slate-400">
                        특수문자를 포함하여 15자 이상 입력해 주세요.
                    </p>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-800 dark:text-slate-200" for="name">이름</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">badge</span>
</span>
<input class="block w-full pl-11 pr-3 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-0 focus:border-primary focus:bg-white dark:focus:bg-slate-800 transition-all text-sm" id="name" name="name" placeholder="홍길동" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-800 dark:text-slate-200" for="email">이메일 주소</label>
<div class="flex gap-2">
<div class="relative flex-grow group">
<span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="block w-full pl-11 pr-3 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-0 focus:border-primary focus:bg-white dark:focus:bg-slate-800 transition-all text-sm" id="email" name="email" placeholder="example@email.com" type="email"/>
</div>
<button class="px-5 py-3 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-primary hover:text-white dark:hover:bg-primary font-semibold rounded-xl text-xs transition-all whitespace-nowrap border border-slate-200 dark:border-slate-700 shadow-sm" type="button">
                        인증하기
                    </button>
</div>
</div>
<div class="pt-6 flex flex-col sm:flex-row gap-3">
<button class="flex-[2] bg-primary hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/25 transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-[20px]">person_add</span>
                    가입하기
                </button>
<button class="flex-1 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 font-semibold py-3.5 rounded-xl transition-all" type="button">
                    취소
                </button>
</div>
<div class="text-center pt-6">
<p class="text-[13px] text-slate-500 dark:text-slate-400">
                    이미 계정이 있으신가요? <a class="text-primary hover:text-blue-700 font-bold underline underline-offset-4 ml-1" href="#">로그인</a>
</p>
</div>
</form>
</div>
</div>

</body></html>
